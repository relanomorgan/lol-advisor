services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lol_advisor
      POSTGRES_USER: lol_user
      POSTGRES_PASSWORD: change_me
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  postgres_data:
